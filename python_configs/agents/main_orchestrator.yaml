# Solace AI Connector A2A ADK Orchestrator Component Configurations
#
# This file demonstrates various ways to configure the A2A_ADK_HostComponent.
# The app-level 'namespace' will be automatically prepended
# to queue names by the custom A2A_ADK_App class.
# The required A2A subscriptions are also automatically generated by A2A_ADK_App.
# Remember to set required environment variables (e.g., SOLACE_*, GOOGLE_API_KEY,
# GOOGLE_CLOUD_PROJECT, GOOGLE_CLOUD_LOCATION, specific LLM keys, NAMESPACE).


# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    # App Level Config
    app_config:
      namespace: ${NAMESPACE} 
      supports_streaming: true # Host capability flag
      agent_name: "OrchestratorAgent"
      display_name: "Orchestrator"
      model: *planning_model 

      instruction: |
        You are the Orchestrator Agent within an AI agentic system. Your primary responsibilities are to:
        1. Process tasks received from external sources via the system Gateway.
        2. Analyze each task to determine the optimal execution strategy:
           a. Single Agent Delegation: If the task can be fully addressed by a single peer agent (based on their declared capabilities/description), delegate the task to that agent.
           b. Multi-Agent Coordination: If task completion requires a coordinated effort from multiple peer agents: first, devise a logical execution plan (detailing the sequence of agent invocations and any necessary data handoffs). Then, manage the execution of this plan, invoking each agent in the defined order.
           c. Direct Execution: If the task is not suitable for delegation (neither to a single agent nor a multi-agent sequence) and falls within your own capabilities, execute the task yourself.

        ** CRITICAL Artifact Management Guidelines **:
        - If an artifact was created during the task (either by yourself or a delegated agent), you must use the `list_artifacts` tool to get the details of the created artifacts.
        - You must then review the list of artifacts (either created by yourself or by a delegated agent) and return the ones that are important for the user by using the `signal_artifact_for_return` tool.
        - Provide regular progress updates using `status_update` embed directives, especially before initiating any tool call.
        - When delegating to peer agents, artifacts created by them exist in YOUR session but are NOT automatically signaled for return to the user. You MUST explicitly list and signal them yourself.
        - After task completion, provide a clear summary of what artifacts were created and signaled for return.

        ** CRITICAL Data Freshness and Temporal Context Guidelines **:
        1. Always consider the timeliness of the data you are working with.
        2. When working with dynamic data (support tickets, real-time systems, etc.):
          - Always inform users that you're working with a snapshot from a specific timestamp
          - When asked about current values, consider whether the data might have changed
          - Proactively offer to refresh data if the conversation continues over time
          - Include the "Last Modified Date" when presenting key information

      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      
      # for local testing only, use memory session service
      # session_service: *default_session_service

      # session_service:
      #   type: "sql"
      #   database_url: "postgresql://${orchestrator_agent_user}:${orchestrator_agent_password}@${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${orchestrator_agent_db_name}"
      #   default_behavior: "PERSISTENT"
      session_service:
        type: "sql"
        database_url: "sqlite:///data/orchestrator_agent.db"
        default_behavior: "PERSISTENT"

      # s3 is the default artifact service defined in shared_config.yaml
      artifact_service: *default_artifact_service

      artifact_handling_mode: "reference"
      enable_embed_resolution: true # Enable embed feature and instruction injection
      enable_artifact_content_instruction: true # Enable instruction for late-stage embed
      data_tools_config: *default_data_tools_config # Use the default data tools config
      tools:
        - tool_type: builtin-group
          group_name: "artifact_management"
        - tool_type: builtin-group
          group_name: "data_analysis"
        - tool_type: builtin
          tool_name: "get_current_time"

      trust_manager:
        enabled: ${TRUST_MANAGER_ENABLED, false}  # Enable or disable the trust manager
        card_publish_interval_seconds: 10  # Publish every 10 seconds for testing
        card_expiration_days: 7  # 1 week for development
        verification_mode: "permissive"  # Log warnings, don't fail during initial testing
        clock_skew_tolerance_seconds: 300  # 5 minutes tolerance
        enable_time_validation: true
        # JWT Configuration (Phase 2)
        jwt_default_ttl_seconds: 3600  # 1 hour default JWT lifetime
        jwt_max_ttl_seconds: 86400     # 24 hours maximum JWT lifetime

      # Agent Card Definition (Simplified)
      agent_card:
        description: "The Orchestrator component. It manages tasks, and coordinating multi-agent workflows."
        defaultInputModes: [text] # Optional, Defaults to ["text"] if omitted
        defaultOutputModes: [text, file] # Indicate potential file output
        skills: [] # Keep, but now optional (defaults to empty list)
        # documentationUrl: Optional
        # provider: Optional
      # Discovery & Communication
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true # Enable discovery and peer delegation instruction injection
      inter_agent_communication:
        allow_list: ["*"]
        deny_list: ["HealthMonitorAgent", "GongAgent", "CommonRoomAgent", "ProductKnowledgeAgent", "LicenseComplianceAgent", "JiraConfluenceServiceAgent"]  # These agents should not be directly delegated by the orchestrator
        request_timeout_seconds: 600
