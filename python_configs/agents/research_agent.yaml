# Research Agent Configuration
# This agent combines quick web search with deep research capabilities
# Uses a two-tier approach: quick answers first, then offers deeper research

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: research_agent.log

!include ../shared_config.yaml

apps:
  - name: "ResearchAgent_app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "ResearchAgent"
      display_name: "Research Agent"
      model: *general_model

      instruction: |
        You are a research assistant that combines quick web search with comprehensive deep research capabilities.
        
        **When to Use Web Search:**
        - Current events and news
        - Factual information that may have changed recently
        - Product information and reviews
        - Technical documentation and guides
        - General knowledge questions
        
        **Your Role:**
        - Perform quick, focused web searches to answer user questions
        - Provide concise summaries based on ACTUAL search results
        - Offer deeper research when users want more comprehensive analysis
        
        **How to Use Web Search:**
        1. When asked a question, determine if web search is needed
        2. Use the web search tool to search for relevant information
        3. Analyze the search results
        4. Provide a clear, concise answer with citations
        5. Offer deeper research option
        
        **CITATION RULES:**
        
        1. You MUST call web_search FIRST
        2. You MUST wait for results
        3. You MUST base your answer on those results
        4. IF you use the web search tool, then You MUST use [[cite:searchN]] where N is the result index (0, 1, 2, etc.)
        5. You MUST NOT include citations without actual search results
        6. You MUST NOT hallucinate information
        
        **Best Practices:**
        - Use specific, targeted search queries
        - Prioritize recent and authoritative sources
        - If results are insufficient, try alternative search queries
        - Be transparent about information limitations
        
        **Citation Format:**
        - Use [[cite:searchN]] format where N is the result index (0-indexed)
        - Place citations AFTER the period at the end of sentences
        - DO NOT manually list sources at the end of your response
        - The system will automatically display source links to the user
        
        **IMPORTANT - Image Results:**
        - Image results will be displayed AUTOMATICALLY by the UI
        - DO NOT cite images using [[cite:imageN]] format
        - DO NOT mention image URLs or image sources in your text
        - Simply describe what you found and the UI will show the images
        
        **AFTER EVERY ANSWER, OFFER DEEPER RESEARCH:**
        
        End your response with:
        ---
        💡 **Want to dive deeper?** I can conduct comprehensive research on this topic with multiple sources, detailed analysis, and a full report. Just say "go deeper" and I'll start a thorough investigation.
        
        **DEEP RESEARCH (When User Says "go deeper" or explicitly requests):**
        
        If user explicitly requests deep research:
        
        **CRITICAL: DO NOT EXPAND OR RESTRUCTURE THE USER'S QUERY**
        
        The deep_research tool has its own internal LLM that will:
        - Break down the research question into optimal search queries
        - Generate 3-5 targeted queries covering different aspects
        - Iteratively refine queries based on findings
        
        Your job is to pass the user's query AS-IS (or with minimal clarification).
        
        ✅ CORRECT: User says "research gold as reserve currency" → Pass "gold as reserve currency"
        ✅ CORRECT: User says "go deeper on quantum computing" → Pass "quantum computing"
        ❌ WRONG: Expanding to "Conduct comprehensive research on gold covering: 1) Ancient use 2) Gold standard 3) Bretton Woods..."
        
        1. Call deep_research tool with the user's original query:
           ```
           deep_research(
               research_question="<user's original query - do not expand>"
           )
           ```
        
        2. Present Results using:
           ```markdown
           «artifact_return:{{response_artifact.filename}}:{{response_artifact.version}}»
           ```
        
        **CORRECT EXAMPLE:**
        
        User: "What is quantum computing?"
        
        ✅ CORRECT BEHAVIOR:
        1. You call: web_search(query="quantum computing explanation")
        2. You receive results with sources
        3. You write response based on those results:
        
        "Quantum computing is a type of computation that uses quantum mechanical phenomena.[[cite:search0]] It uses qubits instead of classical bits, allowing for superposition and entanglement.[[cite:search1]] Applications include cryptography and drug discovery.[[cite:search2]]
        
        ---
        💡 **Want to dive deeper?** I can conduct comprehensive research with multiple sources and a detailed report. Just say "go deeper"."
        
        ❌ WRONG BEHAVIOR:
        - Writing a response with [[cite:search0]] WITHOUT first calling web_search
        - Making up information without searching
        - Including citation markers without actual results
      
      tools:
        # Web Search Tools for quick answers
        - tool_type: builtin-group
          group_name: web_search
          tool_config:    
            # API keys for web search
            google_search_api_key: "${GOOGLE_SEARCH_API_KEY}"
            google_cse_id: "${GOOGLE_CSE_ID}"
        
        # Deep Research Tool for comprehensive analysis
        - tool_type: builtin
          tool_name: deep_research
          tool_config:
            # Research parameters - set agent-level defaults
            max_iterations: 2              # Reduced from 5 for faster testing
            max_runtime_seconds: 120       # Reduced from 300 (5 min) to 120 (2 min) for faster testing
            sources: ["web"]               # Default sources
      
            # Web request limits
            max_response_size_bytes: 5242880  # 5 MB limit for fetched web pages
      
            # API keys for web search (used by deep research)
            google_search_api_key: "${GOOGLE_SEARCH_API_KEY}"
            google_cse_id: "${GOOGLE_CSE_ID}"
        
        # Artifact management for deep research reports
        - group_name: artifact_management
          tool_type: builtin-group

      # session_service:
      #   type: "sql"
      #   database_url: "postgresql://${research_agent_user}:${research_agent_password}@${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${research_agent_db_name}"
      #   default_behavior: "PERSISTENT"
      session_service:
        type: "sql"
        database_url: "sqlite:///data/research_agent.db"
        default_behavior: "PERSISTENT"
      
      # s3 is the default artifact service defined in shared_config.yaml
      artifact_service: *default_artifact_service
      
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      enable_auto_continuation: true
      max_llm_calls_per_task: 30  # Higher limit for iterative research
      data_tools_config: *default_data_tools_config

      trust_manager:
        enabled: ${TRUST_MANAGER_ENABLED, false}  # Enable or disable the trust manager
        card_publish_interval_seconds: 10  # Publish every 10 seconds for testing
        card_expiration_days: 7  # 1 week for development
        verification_mode: "permissive"  # Log warnings, don't fail during initial testing
        clock_skew_tolerance_seconds: 300  # 5 minutes tolerance
        enable_time_validation: true
        # JWT Configuration (Phase 2)
        jwt_default_ttl_seconds: 3600  # 1 hour default JWT lifetime
        jwt_max_ttl_seconds: 86400     # 24 hours maximum JWT lifetime

      # Agent Card Definition
      agent_card:
        version: "1.0.0"
        description: |
          External public data research agent that searches the public internet for information.
          
          **IMPORTANT: This agent ONLY accesses external, publicly available data sources.**
          It does NOT have access to:
          - Internal company systems (Salesforce, CRM, internal databases, business applications)
          - Private or proprietary data
          - Customer records or internal business data
          - Any authenticated or restricted systems
          
          **Use this agent for:**
          - Public web searches and internet research
          - General knowledge questions from public sources
          - Current events and news from public websites
          - Public documentation and guides
          - Academic and publicly available research
          
          **Do NOT use this agent for:**
          - Internal company data or CRM queries
          - Internal company information
          - Customer or employee records
          - Any data requiring authentication or internal access
          
          **Two-Tier Approach:**
          
          1. **Quick Search (Default)**
             - Fast answers from public web sources
             - Concise summaries with citations
             - Perfect for quick lookups and general queries
          
          2. **Deep Research (On Request)**
             - Comprehensive multi-source analysis from public sources
             - Iterative research with reflection
             - Detailed reports with extensive citations
             - Available when you need more depth
          
          **How It Works:**
          - Ask any question and get a quick, helpful answer from public sources
          - After each answer, you'll be offered the option for deeper research
          - Say "go deeper" or "do deep research" for comprehensive analysis
          
          **Tip:** Start with a question - you'll get a quick answer from public sources and can always dive deeper!
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "quick_search"
            name: "Quick Web Search"
            description: "Fast searches of PUBLIC internet sources for quick answers with citations. Only accesses external, publicly available data - NOT internal company systems or databases."
          - id: "deep_research"
            name: "Deep Research"
            description: "Comprehensive research from PUBLIC web sources with multiple citations and detailed reports. Only accesses external, publicly available data - NOT internal company systems."
          - id: "source_citation"
            name: "Source Citation"
            description: "Automatic citation of public web sources with links and metadata."
      
      # Discovery & Communication
      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["ResearchAgent"]  # Prevet self-delegation
        request_timeout_seconds: 600