# This is the configuration file for the AsyncService.
#
# It fulfills a few functions:
# 1. It manages asynchronous tasks such as approval requests
# 2. It stores task state in a database or in memory
# 3. It handles timeouts for tasks
# 4. It processes approval decisions and resumes tasks when all approvals are received

---
log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: solace_ai_connector.log

shared_config:
  - broker_config: &broker_connection
      broker_connection_share: ${SOLACE_BROKER_URL}
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL}
      broker_username: ${SOLACE_BROKER_USERNAME}
      broker_password: ${SOLACE_BROKER_PASSWORD}
      broker_vpn: ${SOLACE_BROKER_VPN}
      temporary_queue: ${USE_TEMPORARY_QUEUES, false}

# AsyncService flows
flows:
  # Handle task creation requests
  - name: async_service_task_creation
    components:
      # Input from a Solace broker
      - component_name: solace_sw_broker
        component_module: broker_input
        component_config:
          <<: *broker_connection
          broker_queue_name: ${SOLACE_AGENT_MESH_NAMESPACE}async_service_task_creation
          broker_subscriptions:
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/async/task/create
              qos: 1
          payload_encoding: utf-8
          payload_format: json

      # Process the task creation request
      - component_name: async_service_component
        component_base_path: .
        component_module: src.services.async_service.async_service_component
        component_config:
          db_config:
            type: ${ASYNC_DB_TYPE, "memory"}
            host: ${ASYNC_DB_HOST, "localhost"}
            port: ${ASYNC_DB_PORT, 3306}
            username: ${ASYNC_DB_USERNAME, "root"}
            password: ${ASYNC_DB_PASSWORD, ""}
            database: ${ASYNC_DB_NAME, "async_service"}
          default_timeout_seconds: ${ASYNC_DEFAULT_TIMEOUT, 3600}
        input_transforms:
          - type: copy
            source_expression: previous:message
            dest_expression: user_data.output:task
          - type: copy
            source_value: "create_task"
            dest_expression: user_data.output:action
        component_input:
          source_expression: user_data.output

      # Send the response
      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          payload_encoding: utf-8
          payload_format: json
        component_input:
          source_expression: previous

  # Handle approval requests
  - name: async_service_approval_request
    components:
      # Input from a Solace broker
      - component_name: solace_sw_broker
        component_module: broker_input
        component_config:
          <<: *broker_connection
          broker_queue_name: ${SOLACE_AGENT_MESH_NAMESPACE}async_service_approval_request
          broker_subscriptions:
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/async/approval/create
              qos: 1
          payload_encoding: utf-8
          payload_format: json

      # Process the approval request
      - component_name: async_service_component
        component_base_path: .
        component_module: src.services.async_service.async_service_component
        component_config:
          db_config:
            type: ${ASYNC_DB_TYPE, "memory"}
            host: ${ASYNC_DB_HOST, "localhost"}
            port: ${ASYNC_DB_PORT, 3306}
            username: ${ASYNC_DB_USERNAME, "root"}
            password: ${ASYNC_DB_PASSWORD, ""}
            database: ${ASYNC_DB_NAME, "async_service"}
          default_timeout_seconds: ${ASYNC_DEFAULT_TIMEOUT, 3600}
        input_transforms:
          - type: copy
            source_expression: input.payload
            dest_expression: user_data.output:payload
          - type: copy
            source_value: "add_approval"
            dest_expression: user_data.output:action
        component_input:
          source_expression: user_data.output

      # Send the response
      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          payload_encoding: utf-8
          payload_format: json
        component_input:
          source_expression: previous

  # Handle approval decisions
  - name: async_service_approval_decision
    components:
      # Input from a Solace broker
      - component_name: solace_sw_broker
        component_module: broker_input
        component_config:
          <<: *broker_connection
          broker_queue_name: ${SOLACE_AGENT_MESH_NAMESPACE}async_service_approval_decision
          broker_subscriptions:
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/async/decision/submit
              qos: 1
          payload_encoding: utf-8
          payload_format: json

      # Process the approval decision
      - component_name: async_service_component
        component_base_path: .
        component_module: src.services.async_service.async_service_component
        component_config:
          db_config:
            type: ${ASYNC_DB_TYPE, "memory"}
            host: ${ASYNC_DB_HOST, "localhost"}
            port: ${ASYNC_DB_PORT, 3306}
            username: ${ASYNC_DB_USERNAME, "root"}
            password: ${ASYNC_DB_PASSWORD, ""}
            database: ${ASYNC_DB_NAME, "async_service"}
          default_timeout_seconds: ${ASYNC_DEFAULT_TIMEOUT, 3600}
        input_transforms:
          - type: copy
            source_expression: input.payload
            dest_expression: user_data.output:payload
          - type: copy
            source_value: "add_decision"
            dest_expression: user_data.output:action
        component_input:
          source_expression: user_data.output

      # Send the response
      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          payload_encoding: utf-8
          payload_format: json
        component_input:
          source_expression: previous

  # Timer flow - check for timeouts every minute
  - name: async_service_timeout_check
    components:
      # Timer component
      - component_name: timer
        component_module: timer_input
        component_config:
          interval_ms: 60000  # Check every minute

      # Process the timeout check
      - component_name: async_service_component
        component_base_path: .
        component_module: src.services.async_service.async_service_component
        component_config:
          db_config:
            type: ${ASYNC_DB_TYPE, "memory"}
            host: ${ASYNC_DB_HOST, "localhost"}
            port: ${ASYNC_DB_PORT, 3306}
            username: ${ASYNC_DB_USERNAME, "root"}
            password: ${ASYNC_DB_PASSWORD, ""}
            database: ${ASYNC_DB_NAME, "async_service"}
          default_timeout_seconds: ${ASYNC_DEFAULT_TIMEOUT, 3600}
        input_transforms:
          - type: copy
            source_value: "check_timeouts"
            dest_expression: user_data.output:action
        component_input:
          source_expression: user_data.output

      # Break the response into individual messages
      - component_name: split_response
        component_module: iterate

      # Send the timeout notifications
      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          payload_encoding: utf-8
          payload_format: json
        component_input:
          source_expression: previous

  # Handle task info requests
  - name: async_service_task_info
    components:
      # Input from a Solace broker
      - component_name: solace_sw_broker
        component_module: broker_input
        component_config:
          <<: *broker_connection
          broker_queue_name: ${SOLACE_AGENT_MESH_NAMESPACE}async_service_task_info
          broker_subscriptions:
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/async/task/get
              qos: 1
          payload_encoding: utf-8
          payload_format: json

      # Process the task info request
      - component_name: async_service_component
        component_base_path: .
        component_module: src.services.async_service.async_service_component
        component_config:
          db_config:
            type: ${ASYNC_DB_TYPE, "memory"}
            host: ${ASYNC_DB_HOST, "localhost"}
            port: ${ASYNC_DB_PORT, 3306}
            username: ${ASYNC_DB_USERNAME, "root"}
            password: ${ASYNC_DB_PASSWORD, ""}
            database: ${ASYNC_DB_NAME, "async_service"}
          default_timeout_seconds: ${ASYNC_DEFAULT_TIMEOUT, 3600}
        input_transforms:
          - type: copy
            source_expression: input.payload
            dest_expression: user_data.output:payload
          - type: copy
            source_value: "get_task"
            dest_expression: user_data.output:action
        component_input:
          source_expression: user_data.output

      # Send the response
      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          payload_encoding: utf-8
          payload_format: json
        component_input:
          source_expression: previous