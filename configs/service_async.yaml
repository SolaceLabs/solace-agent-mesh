# This is the configuration file for the Async Service.
#
# The Async Service handles asynchronous tasks for human-in-the-loop interactions.
# It will subscribe to async service events and manage task groups and tasks.
#
# The general topic format is:
# - <namespace>/solace-agent-mesh/v1/stimulus/async_service/<verb>/<stimulus-uuid>/<session-uuid>/<originator-id>
#
# The specific subscriptions are:
# - <namespace>/solace-agent-mesh/v1/stimulus/async_service/createTaskGroup/>
# - <namespace>/solace-agent-mesh/v1/stimulus/async_service/userResponse/>

---
log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: solace_agent_mesh.log

shared_config:
  - broker_config: &broker_connection
      broker_connection_share: ${SOLACE_BROKER_URL}
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL}
      broker_username: ${SOLACE_BROKER_USERNAME}
      broker_password: ${SOLACE_BROKER_PASSWORD}
      broker_vpn: ${SOLACE_BROKER_VPN}
      payload_encoding: utf-8
      payload_format: json
      temporary_queue: ${USE_TEMPORARY_QUEUES, false}

flows:
  # Handling async service requests
  - name: async-service
    components:
      - component_name: broker_input
        component_module: broker_input
        component_config:
          <<: *broker_connection
          broker_queue_name: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/async_service
          broker_subscriptions:
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/stimulus/async_service/createTaskGroup/>
              qos: 1
            - topic: ${SOLACE_AGENT_MESH_NAMESPACE}solace-agent-mesh/v1/stimulus/async_service/userResponse/>
              qos: 1

      - component_name: async_service_component
        component_module: src.services.async_service.async_service_component
        component_config:
          storage_provider: ${ASYNC_SERVICE_STORAGE_PROVIDER, memory}
          mongodb_connection_string: ${MONGODB_CONNECTION_STRING, mongodb://localhost:27017/}
          mongodb_username: ${MONGODB_USERNAME, ""}
          mongodb_password: ${MONGODB_PASSWORD, ""}
          task_timeout: ${ASYNC_TASK_TIMEOUT, 3600}
        input_selection:
          source_expression: input.payload

      - component_name: broker_output
        component_module: broker_output
        component_config:
          <<: *broker_connection
          copy_user_properties: true
        input_transforms:
          - type: copy
            source_expression: previous
            dest_expression: user_data.output:payload
          - type: copy
            source_expression: input.user_properties:__solace_ai_connector_broker_request_response_topic__
            dest_expression: user_data.output:topic
        input_selection:
          source_expression: user_data.output