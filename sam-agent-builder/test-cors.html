<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test for Solace Agent Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #0c2139;
        }
        button {
            background-color: #00af83;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        pre {
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            overflow: auto;
        }
        .success {
            color: #00af83;
            font-weight: bold;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>CORS Test for Solace Agent Builder</h1>
    <p>This page tests CORS configurations for the backend API.</p>
    
    <div>
        <button onclick="testHealth()">Test Health Endpoint (GET)</button>
        <button onclick="testCreateAgent()">Test Create Agent (POST)</button>
        <button onclick="testOptions()">Test OPTIONS Request</button>
    </div>
    
    <h2>Results:</h2>
    <pre id="result">Click a button to run a test.</pre>
    
    <script>
        async function testHealth() {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = 'Testing health endpoint...';
            
            try {
                const response = await fetch('http://localhost:5002/api/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const responseHeaders = {};
                for (const [key, value] of response.headers.entries()) {
                    responseHeaders[key] = value;
                }
                
                const data = await response.json();
                resultEl.innerHTML = `<span class="success">Success!</span>\n\nResponse:\n${JSON.stringify(data, null, 2)}\n\nHeaders:\n${JSON.stringify(responseHeaders, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }
        
        async function testCreateAgent() {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = 'Testing create agent endpoint...';
            
            try {
                const response = await fetch('http://localhost:5002/api/create-agent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'CORS Test Agent',
                        description: 'Testing CORS configuration',
                        apiKey: null
                    })
                });
                
                const responseHeaders = {};
                for (const [key, value] of response.headers.entries()) {
                    responseHeaders[key] = value;
                }
                
                const data = await response.json();
                resultEl.innerHTML = `<span class="success">Success!</span>\n\nResponse:\n${JSON.stringify(data, null, 2)}\n\nHeaders:\n${JSON.stringify(responseHeaders, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }
        
        async function testOptions() {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = 'Testing OPTIONS request...';
            
            try {
                const response = await fetch('http://localhost:5002/api/create-agent', {
                    method: 'OPTIONS',
                    headers: {
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'Content-Type, Authorization',
                        'Origin': 'http://localhost:3000'
                    }
                });
                
                const responseHeaders = {};
                for (const [key, value] of response.headers.entries()) {
                    responseHeaders[key] = value;
                }
                
                resultEl.innerHTML = `<span class="success">Success!</span>\n\nStatus: ${response.status}\n\nHeaders:\n${JSON.stringify(responseHeaders, null, 2)}`;
            } catch (error) {
                resultEl.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }
    </script>
</body>
</html>
