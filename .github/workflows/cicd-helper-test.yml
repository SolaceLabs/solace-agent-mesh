name: Test cicd-helper (branch test)

on:
  push:

permissions:
  contents: read
  packages: read

jobs:
  test-cicd-helper:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Change Log Message
        id: changelog
        uses: SolaceDev/solace-public-workflows/.github/actions/cicd-helper@feat/dynamic-github-org-image-pull
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rc_step: prepare_change_log_message
          repo_name: ${{ github.repository }}
          deployed_ref: main
          candidate_ref: ${{ github.sha }}

      - name: Get RC Version from DynamoDB
        id: get_rc_version
        uses: SolaceDev/solace-public-workflows/.github/actions/cicd-helper@feat/dynamic-github-org-image-pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MANIFEST_READ_ONLY_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MANIFEST_READ_ONLY_AWS_SECRET_ACCESS_KEY }}
        with:
          rc_step: get_item_value_from_dynamodb
          ddb_table_name: solace-cloud-manifest
          ddb_query_json: '{"squad": "ai", "repository": "solace-agent-mesh-enterprise"}'
          ddb_partition_key: squad
          ddb_field_path: rc.version
          ddb_output_name: RC_VERSION
          aws_region: us-east-1

      - name: Post to Slack
        uses: SolaceDev/solace-public-workflows/.github/actions/cicd-helper@feat/dynamic-github-org-image-pull
        with:
          rc_step: post_to_channel
          slack_token: ${{ secrets.SLACK_TOKEN }}
          slack_channel: G015384QZAB
          message: "[cicd-helper branch test] changelog prepared ✓ | RC_VERSION=${{ steps.get_rc_version.outputs.RC_VERSION }}"
