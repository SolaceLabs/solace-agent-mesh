name: Test and SonarQube Analysis

on:
  workflow_call:
    inputs:
      git_ref:
        type: string
        required: false
        default: "main"
        description: "Git reference to test against"
      min-python-version:
        type: string
        required: false
        default: "3.10"
        description: "Minimum Python version to test against"
      max-python-version:
        type: string
        required: false
        default: "3.13"
        description: "Maximum Python version to test against"
      node-version:
        type: string
        required: false
        default: "25.5.0"
        description: "Node.js version for UI tests"
      ui-path:
        type: string
        required: false
        default: "client/webui/frontend"
        description: "Path to the UI frontend directory"

      run_sonarqube_analysis:
        type: boolean
        required: false
        default: true
        description: "Whether to run SonarQube analysis"
      run_quality_gate:
        type: boolean
        required: false
        default: true
        description: "Whether to run SonarQube quality gate"
    secrets:
      SONAR_TOKEN:
        description: "SonarQube token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube host URL"
        required: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ----------------------------------------------------
  # DEPENDENCY VALIDATION
  # ----------------------------------------------------
  validate-dependencies:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Checkout Workflows Repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          repository: SolaceDev/solace-public-workflows
          path: workflows-repo

      - name: Validate Dependency Conflicts
        uses: ./workflows-repo/.github/actions/validate-dependency-conflicts
        with:
          pyproject-file: pyproject.toml
          fail-on-conflicts: true
          script-path: workflows-repo/.github/scripts/validate_dependencies.py

  # ----------------------------------------------------
  # PYTHON TESTS (Matrix)
  # ----------------------------------------------------
  test-python-matrix:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - ${{ inputs.min-python-version }}
          - ${{ inputs.max-python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Checkout Workflows Repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          repository: SolaceDev/solace-public-workflows
          path: workflows-repo

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0

      - name: Install Hatch
        run: uv tool install hatch

      - name: Create Hatch Environment
        run: hatch -v env create hatch-test.py${{ matrix.python-version }}

      - name: Run Tests with Hatch
        run: |
          set +e  # Don't exit on error - we want to generate coverage even if tests fail

          # Run tests in parallel with unbuffered output
          PYTHONUNBUFFERED=1 COVERAGE_FILE=.coverage.1 hatch -v run hatch-test.py${{ matrix.python-version }}:pytest tests/ --ignore=tests/integration --cov --cov-report= -v --tb=short --color=yes --maxfail=1 --junitxml=junit-non-integration.xml &
          PID1=$!

          PYTHONUNBUFFERED=1 COVERAGE_FILE=.coverage.2 hatch -v run hatch-test.py${{ matrix.python-version }}:pytest tests/integration/ --cov --cov-report= -v --tb=short --color=yes --maxfail=1 --junitxml=junit-integration.xml &
          PID2=$!

          # Wait and capture exit codes
          wait $PID1
          EXIT1=$?
          wait $PID2
          EXIT2=$?

          # Always generate coverage and junit reports (even if tests failed)
          echo "📊 Generating coverage reports..."
          hatch -v run hatch-test.py${{ matrix.python-version }}:coverage combine || echo "⚠️ Coverage combine failed"
          hatch -v run hatch-test.py${{ matrix.python-version }}:coverage xml -o coverage.xml || echo "⚠️ Coverage XML generation failed"
          hatch -v run hatch-test.py${{ matrix.python-version }}:coverage report --show-missing || echo "⚠️ Coverage report failed"

          # Create combined JUnit XML (expected by upload step)
          cat junit-non-integration.xml junit-integration.xml > junit-${{ matrix.python-version }}.xml || echo "⚠️ JUnit XML merge failed"

          # Report test results and fail if either test suite failed
          if [ $EXIT1 -ne 0 ] || [ $EXIT2 -ne 0 ]; then
            echo "❌ Tests failed: non-integration=$EXIT1, integration=$EXIT2"
            exit 1
          else
            echo "✅ All tests passed"
          fi

      - name: Upload Test Results
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5.6.2
        if: always()
        with:
          check_name: Unit Tests on Python ${{ matrix.python-version }}
          report_paths: junit-${{ matrix.python-version }}.xml
          include_passed: true

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always() # Upload artifacts even if tests failed
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            junit-${{ matrix.python-version }}.xml
          retention-days: 1

  # ----------------------------------------------------
  # UI TESTS WITH COVERAGE
  # ----------------------------------------------------
  test-ui:
    name: Test UI (Storybook + Unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.ui-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.ui-path }}/package-lock.json
          registry-url: https://npm.pkg.github.com/
          scope: "@SolaceLabs"

      - name: Configure npm
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ github.token }}" > .npmrc
          echo "@SolaceLabs:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "legacy-peer-deps=true" >> .npmrc

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Restore Playwright Browser From Cache
        id: restore-playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', inputs.ui-path)) }}

      - name: Install Playwright browsers
        if: steps.restore-playwright-cache.outputs.cache-hit != 'true'
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.restore-playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', inputs.ui-path)) }}

      - name: Run lint
        run: npm run lint

      - name: Run Storybook Tests with Coverage
        run: npm run ci:storybook:coverage
        env:
          NODE_OPTIONS: "--no-webstorage"

      - name: Upload UI Coverage Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-coverage
          path: ${{ inputs.ui-path }}/coverage/
          retention-days: 1

  # ----------------------------------------------------
  # BUILD AND VERIFY PACKAGES
  # ----------------------------------------------------
  build-and-verify:
    name: Build and Verify Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}
      - name: Checkout Workflows Repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          repository: SolaceDev/solace-public-workflows
          path: workflows-repo

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.ui-path }}/package-lock.json

      - name: Install and Build Frontend
        run: |
          cd ${{ inputs.ui-path }}
          npm ci
          npm run build

      - name: Setup Python for Build
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ inputs.max-python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install Hatch and Twine
        run: |
          uv tool install hatch
          uv tool install twine

      - name: Run Lint
        continue-on-error: true
        run: |
          hatch run hatch-static-analysis:ruff check ./src ./tests --show-files 
          hatch run hatch-static-analysis:ruff check ./src ./tests -o lint.json --output-format json || true
          if [ -f lint.json ] && jq empty lint.json 2>/dev/null; then
            echo "Lint check completed successfully"
          else
            echo "Error: Lint check failed to produce valid output"
            exit 1
          fi

      - name: Build Package
        run: hatch -v build

      - name: Verify Packages
        run: |
          ls dist/*.tar.gz | xargs -n1 twine check
          ls dist/*.whl | xargs -n1 twine check

  # ----------------------------------------------------
  # UNIFIED SONARQUBE ANALYSIS (Python + UI Coverage)
  # ----------------------------------------------------
  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [validate-dependencies, test-python-matrix, test-ui]
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.sha }}
      - name: Download Python Coverage Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-coverage-${{ inputs.max-python-version }}
          path: python-coverage

      - name: Download UI Coverage Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ui-coverage
          path: ${{ inputs.ui-path }}/coverage

      - name: Prepare Coverage Reports
        env:
          UI_PATH: ${{ inputs.ui-path }}
        run: |
          echo "📊 Preparing coverage reports for SonarQube..."

          # Move Python coverage to root
          if [ -f "python-coverage/coverage.xml" ]; then
            cp python-coverage/coverage.xml coverage.xml
            echo "✅ Python coverage.xml ready"
          else
            echo "⚠️ Python coverage.xml not found"
          fi

          # Verify UI coverage
          if [ -f "${UI_PATH}/coverage/lcov.info" ]; then
            echo "✅ UI lcov.info ready"
          else
            echo "⚠️ UI lcov.info not found"
          fi

          echo ""
          echo "📁 Coverage files:"
          ls -lah coverage.xml 2>/dev/null || echo "No Python coverage"
          ls -lah ${UI_PATH}/coverage/ 2>/dev/null || echo "No UI coverage"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        if: ${{ fromJSON(inputs.run_sonarqube_analysis) }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: ${{ fromJSON(inputs.run_quality_gate) }}
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
