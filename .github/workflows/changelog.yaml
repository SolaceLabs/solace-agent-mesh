name: Generate Changelog

on:
    push:
        branches:
            - changelog
    workflow_dispatch:
        inputs:
            from_ref:
                description: "From reference"
                type: string
                required: false
                default: "1.4.9"
            to_ref:
                description: "To reference"
                type: string
                required: false
                default: "v1.2.20"
            output_file:
                description: "Output file path for release notes"
                type: string
                required: false
                default: "RELEASE_NOTES.md"

permissions:
    contents: read

jobs:
    generate-changelog:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
            - name: Generate Changelog
              uses: SolaceDev/maas-build-actions/generate-github-release-notes@sam-wheel
              with:
                  from-ref: ${{ inputs.from_ref || '1.4.9' }}
                  to-ref: ${{ inputs.to_ref || 'v1.2.20' }}
                  output-file: ${{ inputs.output_file || 'RELEASE_NOTES.md' }}
            - name: Output Changelog
              run: |
                  if [ -f RELEASE_NOTES.md ]; then
                      echo "RELEASE_NOTES.md exists."
                  else
                      echo "RELEASE_NOTES.md does not exist."
                  fi
                  cat RELEASE_NOTES.md >> $GITHUB_STEP_SUMMARY
