name: Test SonarQube Docker Auth

# Targeted test for the docker login + docker run pattern used in
# release-readiness-check.yaml sonarqube-hotspots job.
# Validates that explicit GHCR auth works for cross-repo packages
# (replaces the broken `uses: docker://` approach).

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test-sonarqube-docker:
    name: Test SonarQube Hotspot Docker Pull
    runs-on: ubuntu-latest
    steps:
      - name: Run SonarQube hotspot checker
        id: sonarqube
        continue-on-error: true
        env:
          SONARQUBE_PROJECT_KEY: ${{ secrets.SONARQUBE_PROJECT_KEY }}
          SONARQUBE_PROJECT_MAIN_BRANCH: "main"
          SONARQUBE_QUERY_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONARQUBE_HOTSPOTS_API_URL: ${{ secrets.SONARQUBE_HOTSPOTS_API_URL }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DOCKER_CONFIG=$(mktemp -d "${RUNNER_TEMP}/docker-config.XXXXXX")
          export DOCKER_CONFIG
          trap 'docker logout ghcr.io > /dev/null 2>&1 || true; rm -rf "${DOCKER_CONFIG}"' EXIT
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker run --rm \
            -e SONARQUBE_PROJECT_KEY \
            -e SONARQUBE_PROJECT_MAIN_BRANCH \
            -e SONARQUBE_QUERY_TOKEN \
            -e SONARQUBE_HOTSPOTS_API_URL \
            ghcr.io/${OWNER}/maas-build-actions:latest \
            /bin/sh -c '. $VIRTUAL_ENV/bin/activate && cd $ACTIONS_PATH/sonarqube-hotspot-checker && python sonarqube_checker.py'

      - name: Report result
        if: always()
        run: |
          echo "SonarQube step outcome: ${{ steps.sonarqube.outcome }}"
          if [[ "${{ steps.sonarqube.outcome }}" == "failure" ]]; then
            echo "::error::SonarQube docker auth or script failed"
            exit 1
          fi
