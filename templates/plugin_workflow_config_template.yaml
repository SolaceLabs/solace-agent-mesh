# Plugin Metadata:
# Name: __PLUGIN_KEBAB_CASE_NAME__
# Version: __PLUGIN_VERSION__
# Description: __PLUGIN_DESCRIPTION__
# Author: __PLUGIN_AUTHOR_NAME__ <__PLUGIN_AUTHOR_EMAIL__>
# 
# --- Start of Workflow Configuration Template ---
# Solace Agent Mesh: Workflow Plugin Configuration Template
#
# This file serves as a template for creating new workflow configurations from this plugin.
# Use placeholders like __COMPONENT_KEBAB_CASE_NAME__, __COMPONENT_PASCAL_CASE_NAME__,
# and __COMPONENT_UPPER_SNAKE_CASE_NAME__ where the specific component name should be inserted.
#
# Workflows are declarative DAG definitions — no custom Python code is needed.
# The workflow engine (solace_agent_mesh.workflow.app) handles execution.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: __COMPONENT_KEBAB_CASE_NAME__.log

# To use the `shared_config.yaml` file, uncomment the following line and remove the `shared_config` section below.
# !include ../shared_config.yaml
shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8008}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - services:
    # Default session service configuration
    session_service: &default_session_service
      type: "memory"
      default_behavior: "PERSISTENT"
    
    # Default artifact service configuration
    artifact_service: &default_artifact_service
      type: "filesystem"
      base_path: "/tmp/samv2"
      artifact_scope: namespace # Or "namespace", "app", "custom"

apps:
  - name: __COMPONENT_KEBAB_CASE_NAME__-workflow
    app_module: solace_agent_mesh.workflow.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      name: "__COMPONENT_PASCAL_CASE_NAME__"
      display_name: "__COMPONENT_SPACED_CAPITALIZED_NAME__ Workflow"

      # Timeout configurations
      max_workflow_execution_time_seconds: 600   # 10 minutes
      default_node_timeout_seconds: 120          # 2 minutes

      workflow:
        version: "1.0.0"
        description: |
          __PLUGIN_DESCRIPTION__

        # Define the expected input for this workflow
        inputSchema:
          type: object
          properties:
            input_text:
              type: string
              description: "The input text to process"
          required: [input_text]

        # Define the expected output from this workflow
        outputSchema:
          type: object
          properties:
            result:
              type: string
              description: "The processed result"
          required: [result]

        # --- Workflow DAG Nodes ---
        # Define the sequence of agent invocations that make up this workflow.
        # Each node can reference agents by name and pass data between them.
        #
        # Node types available:
        #   - agent:    Invoke an agent
        #   - switch:   Conditional branching
        #   - loop:     While-loop iteration
        #   - map:      Parallel for-each iteration
        #   - workflow:  Invoke another workflow as a sub-workflow
        #
        # Template expressions:
        #   - {{workflow.input.<field>}}       Access workflow input
        #   - {{<node_id>.output.<field>}}     Access a node's output
        nodes:
          # Step 1: Process the input
          - id: process_input
            type: agent
            agent_name: "REPLACE_WITH_AGENT_NAME"
            instruction: "Process the input text."
            input:
              text: "{{workflow.input.input_text}}"

          # Step 2: Format the result (depends on step 1)
          # Uncomment and configure to add a second step:
          # - id: format_result
          #   type: agent
          #   agent_name: "REPLACE_WITH_ANOTHER_AGENT_NAME"
          #   depends_on: [process_input]
          #   instruction: "Format the processed result."
          #   input:
          #     value: "{{process_input.output.result}}"

        # Map node outputs to the final workflow output
        outputMapping:
          result: "{{process_input.output.result}}"

        # Skills advertised by this workflow's agent card
        skills:
          - id: "__COMPONENT_SNAKE_CASE_NAME___skill"
            name: "__COMPONENT_SPACED_CAPITALIZED_NAME__"
            description: "__PLUGIN_DESCRIPTION__"
            tags: ["workflow"]

      session_service: *default_session_service
      artifact_service: *default_artifact_service

      agent_card_publishing: { interval_seconds: 10 }
