[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: Slow running tests (step-by-step migrations)

# Show extra test summary info
addopts =
    --strict-markers
    --tb=short
    -ra
    --verbose

# Suppress warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning