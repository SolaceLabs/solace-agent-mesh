test_case_id: "viz_tool_call_events_001"
description: >
  Visualization: verify that events are captured during a multi-step
  agent interaction involving a tool call.
tags: ["visualization", "all"]
skip_intermediate_events: true

gateway_input:
  target_agent_name: "TestAgent"
  user_identity: "viz_tool_user@example.com"
  a2a_parts:
    - type: "text"
      text: "What is the weather in San Francisco?"
  external_context:
    a2a_session_id: "session_viz_tool_001"

llm_interactions:
  # Step 1: LLM decides to call the get_weather tool.
  - step_id: "tool_call"
    static_response:
      id: "chatcmpl-viz-tool-1"
      object: "chat.completion"
      model: "test-llm-model"
      choices:
        - index: 0
          message:
            role: "assistant"
            content: ""
            tool_calls:
              - id: "call_weather_1"
                type: "function"
                function:
                  name: "get_weather"
                  arguments: '{"location": "San Francisco"}'
          finish_reason: "tool_calls"
      usage:
        prompt_tokens: 20
        completion_tokens: 15
        total_tokens: 35

  # Step 2: LLM receives tool result and responds.
  - step_id: "final_response"
    static_response:
      id: "chatcmpl-viz-tool-2"
      object: "chat.completion"
      model: "test-llm-model"
      choices:
        - index: 0
          message:
            role: "assistant"
            content: "The weather in San Francisco is sunny."
          finish_reason: "stop"
      usage:
        prompt_tokens: 30
        completion_tokens: 10
        total_tokens: 40

expected_gateway_output:
  - type: "final_response"
    task_state: "completed"
    content_parts:
      - type: "text"
        text_contains: "sunny"

# Subscribe to gateway response/status topics to capture the full
# request lifecycle including status updates during tool execution.
visualization:
  targets:
    - type: topic
      name: "test-ns/a2a/v1/>"
  expected_events:
    # Should see the initial request to the agent.
    - topic_contains: "agent/request/TestAgent"
    # Should see the final response back to the gateway.
    - topic_contains: "gateway/response"
