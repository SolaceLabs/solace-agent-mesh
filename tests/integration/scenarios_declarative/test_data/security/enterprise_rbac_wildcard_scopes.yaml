test_case_id: "enterprise_rbac_wildcard_scopes_001"
description: "Enterprise user with wildcard scope (*) can access agent and all tools."
tags: ["enterprise", "security"]
skip_intermediate_events: true
gateway_input:
  target_agent_name: "TestAgent"
  user_identity: "admin_user@example.com"
  enterprise:
    user_scopes:
      - "*"
    user_roles:
      - "admin"
  a2a_parts:
    - type: "text"
      text: "Summarize the weather forecast."
  external_context:
    a2a_session_id: "session_enterprise_wildcard_001"

llm_interactions:
  - step_id: "agent_responds"
    static_response:
      id: "chatcmpl-enterprise-wildcard"
      object: "chat.completion"
      model: "test-llm-model"
      choices:
        - index: 0
          message:
            role: "assistant"
            content: "The weather forecast shows sunny skies with mild temperatures."
          finish_reason: "stop"
      usage:
        prompt_tokens: 15
        completion_tokens: 10
        total_tokens: 25

expected_gateway_output:
  - type: "final_response"
    content_parts:
      - type: "text"
        text_exact: "The weather forecast shows sunny skies with mild temperatures."
    task_state: "completed"
