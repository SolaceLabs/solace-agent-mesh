test_case_id: "enterprise_rbac_auth_allowed_001"
description: "Enterprise user with scopes is authenticated and processes a request normally."
tags: ["enterprise", "security"]
skip_intermediate_events: true
gateway_input:
  target_agent_name: "TestAgent"
  user_identity: "enterprise_user@example.com"
  enterprise:
    user_scopes:
      - "agent:TestAgent:delegate"
      - "tool:*:execute"
    user_roles:
      - "analyst"
  a2a_parts:
    - type: "text"
      text: "What is the capital of France?"
  external_context:
    a2a_session_id: "session_enterprise_auth_001"

llm_interactions:
  - step_id: "agent_responds"
    static_response:
      id: "chatcmpl-enterprise-auth"
      object: "chat.completion"
      model: "test-llm-model"
      choices:
        - index: 0
          message:
            role: "assistant"
            content: "The capital of France is Paris."
          finish_reason: "stop"
      usage:
        prompt_tokens: 20
        completion_tokens: 8
        total_tokens: 28

expected_gateway_output:
  - type: "final_response"
    content_parts:
      - type: "text"
        text_exact: "The capital of France is Paris."
    task_state: "completed"
