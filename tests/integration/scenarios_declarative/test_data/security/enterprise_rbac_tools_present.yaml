test_case_id: "enterprise_rbac_tools_present_001"
description: "Enterprise auth with wildcard scope ensures all tools are present in LLM request. Validates that authentication + tool filtering works end-to-end."
tags: ["enterprise", "security"]
skip_intermediate_events: true
gateway_input:
  target_agent_name: "TestAgent"
  user_identity: "full_access_user@example.com"
  enterprise:
    user_scopes:
      - "*"
  a2a_parts:
    - type: "text"
      text: "Use the get_time tool."
  external_context:
    a2a_session_id: "session_enterprise_tools_001"

llm_interactions:
  - step_id: "agent_responds"
    expected_request:
      tools_present:
        - "get_current_datetime"
    static_response:
      id: "chatcmpl-enterprise-tools"
      object: "chat.completion"
      model: "test-llm-model"
      choices:
        - index: 0
          message:
            role: "assistant"
            content: "I checked the time for you."
          finish_reason: "stop"
      usage:
        prompt_tokens: 20
        completion_tokens: 8
        total_tokens: 28

expected_gateway_output:
  - type: "final_response"
    content_parts:
      - type: "text"
        text_exact: "I checked the time for you."
    task_state: "completed"
