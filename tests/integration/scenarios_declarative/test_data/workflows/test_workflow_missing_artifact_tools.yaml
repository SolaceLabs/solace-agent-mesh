# Test Case: Artifact tools are auto-injected for workflow node agents that omit them from YAML.
#
# Even though TestPeerAgentNoArtifacts only configures data_analysis tools in its YAML,
# the runtime must inject the artifact_management group automatically so the agent
# can fulfil its role as a structured-invocation workflow node.
#
# Expected sequence:
# 1. Workflow dispatches structured invocation to TestPeerAgentNoArtifacts
# 2. Runtime auto-injects artifact_management tools (load_artifact, save_artifact, etc.)
# 3. LLM call is made — artifact tools are visible in the request
# 4. Agent saves an output artifact and emits the mandatory result embed
# 5. Workflow completes successfully

test_case_id: "workflow_artifact_tools_auto_injected_001"
description: "Artifact management tools are auto-injected for a workflow node agent that omits them from its YAML config."
tags: ["all", "workflows", "validation"]
skip_intermediate_events: true
expected_completion_timeout_seconds: 30

test_runner_config_overrides:
  agent_config:
    artifact_scope: "namespace"

gateway_input:
  target_agent_name: "MissingArtifactToolsWorkflow"
  user_identity: "missing_artifact_test@example.com"
  external_context:
    a2a_session_id: "missing_artifact_test_session"
  parts:
    - type: "text"
      text: "Summarise this text please."

llm_interactions:
  # Turn 1: TestPeerAgentNoArtifacts receives the task.
  # Even though artifact_management is not in its YAML, every tool in the group
  # must be present because the runtime auto-injected it. Using assert_tools_exact
  # to guard against partial-injection regressions (category rename, group membership
  # change, etc.) — asserting just one tool would let such a regression slip through.
  #
  # Expected tool set:
  #   - _continue_generation, _notify_artifact_save        (always-present system tools)
  #   - 7 artifact_management tools                        (auto-injected by this PR)
  #   - create_chart_from_plotly_config                    (from data_analysis group declared in YAML)
  - static_response:
      choices:
        - message:
            role: "assistant"
            content: |
              «««save_artifact: filename="summary.json" mime_type="application/json" description="Summary output"
              {"summary": "This is a summary of the input text."}
              »»»
    expected_request:
      assert_tools_exact:
        - "_continue_generation"
        - "_notify_artifact_save"
        - "append_to_artifact"
        - "apply_embed_and_create_artifact"
        - "artifact_search_and_replace_regex"
        - "create_chart_from_plotly_config"
        - "delete_artifact"
        - "extract_content_from_artifact"
        - "list_artifacts"
        - "load_artifact"

  # Turn 2: Artifact saved — agent emits the mandatory result embed.
  - static_response:
      choices:
        - message:
            role: "assistant"
            content: "Summary complete. «result:artifact=summary.json:0 status=success»"
    expected_request:
      expected_tool_responses_in_llm_messages:
        - tool_name: "_notify_artifact_save"
          response_json_matches:
            filename: "summary.json"
            status: "success"

expected_gateway_output:
  - type: "final_response"
    task_state: "completed"
