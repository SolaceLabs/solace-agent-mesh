test_case_id: "proxy_stream_batching_large_chunk_001"
description: >
  Tests the large-chunk fast-path: when a single streaming update is >= 2x the
  batching threshold, any existing buffer is flushed first as its own event,
  then the large chunk is forwarded immediately without buffering.
  TestAgent_Proxied_Batched has stream_batching_threshold_bytes=10, so the 2x
  cutoff is 20 bytes.
tags: ["all", "proxy", "streaming", "batching"]
skip_intermediate_events: true

gateway_input:
  target_agent_name: "TestAgent_Proxied_Batched"
  user_identity: "proxy_batching_largechunk_tester@example.com"
  parts:
    - type: "text"
      text: "Stream a large chunk at me."
  external_context:
    a2a_session_id: "session_proxy_batching_large_001"

# Sequence:
#   "Hi " (3B) -> buffer=3B < 10 -> held
#   "This is bigger than threshold!!" (31B >= 20B = 2x10) ->
#       flush buffer "Hi " as its own event, then forward large chunk immediately
#   Final "Done." -> clear buffer (empty), pass through
downstream_a2a_agent_responses:
  - id: "downstream-task-id"
    contextId: "session_proxy_batching_large_001"
    kind: "task"
    status:
      state: "submitted"

  - kind: "status-update"
    taskId: "downstream-task-id"
    contextId: "session_proxy_batching_large_001"
    final: false
    status:
      state: "working"
      message:
        role: "agent"
        messageId: "msg-1"
        kind: "message"
        parts:
          - kind: "text"
            text: "Hi "

  - kind: "status-update"
    taskId: "downstream-task-id"
    contextId: "session_proxy_batching_large_001"
    final: false
    status:
      state: "working"
      message:
        role: "agent"
        messageId: "msg-2"
        kind: "message"
        parts:
          - kind: "text"
            text: "This is bigger than threshold!!"

  - kind: "status-update"
    taskId: "downstream-task-id"
    contextId: "session_proxy_batching_large_001"
    final: true
    status:
      state: "completed"
      message:
        role: "agent"
        messageId: "msg-final"
        kind: "message"
        parts:
          - kind: "text"
            text: "Done."

# "Hi " is flushed as its own progress update when the large chunk arrives.
# The large chunk is forwarded immediately (also converted to progress update).
# The final event passes through with its text unchanged.
expected_gateway_output:
  - type: "status_update"
    final_flag: false
    content_parts:
      - type: "data"
        data_contains:
          type: "agent_progress_update"
          status_text: "Hi "
  - type: "status_update"
    final_flag: false
    content_parts:
      - type: "data"
        data_contains:
          type: "agent_progress_update"
          status_text: "This is bigger than threshold!!"
  - type: "final_response"
    task_state: "completed"
    content_parts:
      - type: "text"
        text_exact: "Done."
