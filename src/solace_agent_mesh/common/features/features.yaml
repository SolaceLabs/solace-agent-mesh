# SAM community feature flags
#
# SCHEMA
# ------
# Each entry under `features` must include the following fields:
#
#   key             (string, required)
#                   Unique identifier used in code. Must be stable across
#                   releases — renaming a key is a breaking change. Convention
#                   is snake_case; hyphens are normalised to underscores when
#                   forming SAM_FEATURE_<KEY> environment variable names.
#                   Example: background_tasks
#
#   name            (string, required)
#                   Human-readable label, may be shown in the admin UI.
#                   Example: Background Tasks
#
#   release_phase   (string, required)
#                   Lifecycle stage of the feature. One of:
#                     early_access   - Limited release to specific customers for early feedback.
#                     beta           - Broadly available but not yet fully stabilised.
#                     experimental   - Proof-of-concept; may change or disappear at any time.
#                     ga             - Generally available; stable and supported.
#
#   default_enabled (boolean, required)
#                   Baseline on/off state. In effect when no SAM_FEATURE_<KEY>
#                   environment variable is set.
#
#   jira_epic       (string, required)
#                   Jira epic key that owns this feature (e.g. DATAGO-118673).
#                   Required so that every flag can be traced back to its product work.
#
#   description     (string, optional)
#                   Brief explanation of the feature, may be shown in the admin UI.
#
# EVALUATION PRIORITY (highest wins)
# -----------------------------------
#   1. SAM_FEATURE_<UPPER_KEY> environment variable  (e.g. SAM_FEATURE_BACKGROUND_TASKS=true)
#   2. default_enabled
#
# ENTERPRISE EXTENSIONS
# ----------------------
# Enterprise flags are defined in the enterprise repository's features.yaml and merged
# into this registry at startup. Later definitions win on key conflicts, so enterprise
# can also override community defaults (e.g. enable a community flag by default in
# enterprise deployments).

features:

  - key: mentions
    name: Mentions
    release_phase: beta
    default_enabled: false
    jira_epic: DATAGO-121076
    description: >
      Allow users to @mention other users in chat messages.

  - key: auto_title_generation
    name: Auto Title Generation
    release_phase: beta
    default_enabled: false
    jira_epic: DATAGO-118394
    description: >
      Automatically generate a descriptive title for new chat sessions
      using LLM analysis of the first message exchange.

  - key: project_sharing
    name: Project Sharing
    release_phase: early_access
    default_enabled: false
    jira_epic: DATAGO-115145
    description: >
      Allow users to share projects with other members of their
      organisation.

  - key: project_indexing
    name: Project Indexing
    release_phase: beta
    default_enabled: false
    jira_epic: DATAGO-123919
    description: >
      Enable document indexing and BM25 search within projects for
      citation-backed responses.

  - key: artifacts_page
    name: Artifacts Page
    release_phase: experimental
    default_enabled: false
    jira_epic: DATAGO-125132
    description: >
      Artifacts page for viewing and managing files across sessions
      and projects.

  - key: binary_artifact_preview
    name: Binary Artifact Preview
    release_phase: experimental
    default_enabled: false
    jira_epic: DATAGO-123135
    description: >
      Enable in-browser preview of Office documents (DOCX, PPTX, XLSX)
      via server-side PDF conversion. Requires LibreOffice on the server.

  - key: new_navigation
    name: New Navigation
    release_phase: experimental
    default_enabled: false
    jira_epic: DATAGO-123246
    description: >
      New sidebar and top navigation layout replacing the legacy
      top-nav-only design.

  - key: logout
    name: Logout
    release_phase: ga
    default_enabled: false
    jira_epic: DATAGO-123246
    description: >
      Show a logout button in the navigation when authentication
      is enabled.
